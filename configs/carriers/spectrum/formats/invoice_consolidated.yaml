name: "Spectrum Business Invoice (Multi-Location Consolidated)"
version: "1.2"

signature:
  required_patterns:
    - "Spectrum"
  any_of_patterns:
    - "Hierarchy ID"
    - "Sub-Account"
    - "Spectrum Business(?! for enterprise)"

processing_path: "raw_text"

chunking:
  global_context_source: "first_page"
  column_aware: true
  # Column-aware extraction separates left/right columns per page, fixing the
  # interleaving that caused addresses to map to wrong accounts.
  # No boundary chunking — full document as one section, LLM parses per sub-account.
  # Spatial address correction applied as post-processing.
  # Scanned consolidated bills (26+ pages, dense two-column layout) need smaller
  # page groups for reliable OCR. 2 pages per group reduces context per call
  # and improves extraction of dense line items.
  scanned_pages_per_group: 2

extractable_fields:
  high_confidence:
    - billing_name
    - service_address_1
    - city
    - state
    - zip
    - carrier_account_number
    - sub_account_number_1
    - monthly_recurring_cost
    - quantity
    - cost_per_unit
    - invoice_file_name
    - charge_type
  medium_confidence:
    - service_type
    - component_or_feature_name
    - phone_number
