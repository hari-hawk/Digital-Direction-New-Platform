name: "Peerless/Infobip Signed Quote"
version: "1.0"

signature:
  required_patterns:
    - "(Infobip|Peerless)"
    - "(SERVICE TERMS|Quote|AGREEMENT)"
  any_of_patterns:
    - "Monthly Cost"
    - "Setup Cost"
    - "Channels"

processing_path: "raw_text"

chunking:
  global_context_source: "first_page"

extractable_fields:
  high_confidence:
    - billing_name
    - service_address_1
    - monthly_recurring_cost
    - quantity
    - cost_per_unit
    - contract_term_months
    - contract_number
  medium_confidence:
    - service_type
    - component_or_feature_name
    - contract_begin_date
    - contract_expiration_date
