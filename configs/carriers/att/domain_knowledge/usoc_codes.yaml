# AT&T USOC Code → Human-Readable Description
# Source: AT&T USOC catalog, CSR ACCOUNT SUMMARY sections, AT&T Service Guide.
# These are standard carrier-defined service codes — NOT client data.
#
# How this file is used:
#   The merger's USOC enrichment step (in _apply_field_normalization) checks if
#   component_or_feature_name looks like a raw USOC code (short, uppercase).
#   If found here, the code is replaced with the description.

