name: "Windstream Enterprise Invoice"
version: "1.0"

signature:
  required_patterns:
    - "Windstream"
  any_of_patterns:
    - "Windstream Enterprise"
    - "Account Summary"
    - "LOCATION SUMMARY"
    - "ACTIVITY FOR ACCOUNT"

processing_path: "raw_text"

chunking:
  global_context_source: "first_page"
  boundary_pattern: "ACTIVITY FOR ACCOUNT\\s*-\\s*(\\d+)"
  section_markers:
    - "LOCATION SUMMARY"
    - "PAYMENTS APPLIED"
    - "ACTIVITY FOR ACCOUNT"
    - "ITEMIZED CALL DETAIL"
  validation_section: "LOCATION SUMMARY"

extractable_fields:
  high_confidence:
    - billing_name
    - service_address_1
    - city
    - state
    - zip
    - carrier_account_number
    - sub_account_number_1
    - monthly_recurring_cost
    - quantity
    - cost_per_unit
    - carrier_circuit_number
    - invoice_file_name
    - charge_type
  medium_confidence:
    - service_type
    - component_or_feature_name
    - phone_number
    - num_calls
    - ld_minutes
    - ld_cost
  not_available:
    - contract_term_months
    - contract_begin_date
