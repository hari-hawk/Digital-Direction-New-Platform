name: "Windstream Kinetic Business Invoice"
version: "1.0"

signature:
  required_patterns:
    - "(Kinetic|Windstream)"
  any_of_patterns:
    - "BILLED NUMBER SCREENING"
    - "CENTREX LINK CHARGE"
    - "IBN EXCHANGE"
    - "Thank You For Choosing Kinetic"

processing_path: "raw_text"

chunking:
  global_context_source: "first_page"

extractable_fields:
  high_confidence:
    - billing_name
    - service_address_1
    - city
    - state
    - zip
    - carrier_account_number
    - btn
    - monthly_recurring_cost
    - invoice_file_name
    - charge_type
  medium_confidence:
    - service_type
    - component_or_feature_name
    - phone_number
