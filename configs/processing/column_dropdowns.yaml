# Canonical dropdown vocabularies for the inventory columns.
# Sourced from the customer's "Dropdown Details.xlsx" (2026-04-28).
# Used by:
#   - The extraction prompt (configs/processing/invoice_extraction.md and
#     each carrier's prompts/) — the LLM is told to match these exactly.
#   - A post-extraction normalization step in
#     backend/api/uploads.py::_normalize_dropdown_columns that maps free-form
#     LLM output (e.g. "Tax" → "Taxes", "monthly" → "Yes") to the canonical
#     dropdown value when the match is unambiguous.
#   - Validation: rows that emit a value not in the dropdown get a
#     `review_status` flag so an analyst sees them.

